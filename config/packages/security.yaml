security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        cors:
            pattern: ^/
            methods: [OPTIONS]
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        # OPTIONS toujours autorisés
        - { path: ^/, roles: PUBLIC_ACCESS, methods: [OPTIONS] }

        # Auth
        - { path: ^/api/login,            roles: PUBLIC_ACCESS }
        - { path: ^/api/register,         roles: PUBLIC_ACCESS }

        # Gym registration (SaaS)
        - { path: ^/api/gym/register,     roles: PUBLIC_ACCESS }

        # Boutique publique
        - { path: ^/api/shop/register,    roles: PUBLIC_ACCESS }
        - { path: ^/api/shop/products,    roles: PUBLIC_ACCESS, methods: [GET] }

        # Produits publics en lecture
        - { path: ^/api/products,         roles: PUBLIC_ACCESS, methods: [GET] }

        # Catégories publiques en lecture, admin pour écriture
        - { path: ^/api/categories,       roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/categories,       roles: ROLE_ADMIN,    methods: [POST, PUT, DELETE] }

        # Boutique client connecté
        - { path: ^/api/shop/orders,      roles: ROLE_CLIENT }

        # Tout le reste → connecté
        - { path: ^/api,                  roles: IS_AUTHENTICATED_FULLY }