nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            # ── Web (Vue.js dev) ──────────────────────
            - '^https?://localhost(:[0-9]+)?$'
            - '^https?://127\.0\.0\.1(:[0-9]+)?$'

            # ── Android émulateur ─────────────────────
            - '^https?://10\.0\.2\.2(:[0-9]+)?$'

            # ── Téléphone physique (tout réseau local) ─
            - '^https?://192\.168\.\d+\.\d+(:[0-9]+)?$'
            - '^https?://172\.\d+\.\d+\.\d+(:[0-9]+)?$'
            - '^https?://10\.\d+\.\d+\.\d+(:[0-9]+)?$'

            # ── Expo Go (pas d'origine HTTP classique) ─
            - '^exp://.*$'

        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept']
        expose_headers: ['Link']
        max_age: 3600
        allow_credentials: false

    paths:
        '^/api':
            origin_regex: true
            allow_origin:
                # ── Web (Vue.js dev) ──────────────────────
                - '^https?://localhost(:[0-9]+)?$'
                - '^https?://127\.0\.0\.1(:[0-9]+)?$'

                # ── Android émulateur ─────────────────────
                - '^https?://10\.0\.2\.2(:[0-9]+)?$'

                # ── Téléphone physique (tout réseau local) ─
                - '^https?://192\.168\.\d+\.\d+(:[0-9]+)?$'
                - '^https?://172\.\d+\.\d+\.\d+(:[0-9]+)?$'
                - '^https?://10\.\d+\.\d+\.\d+(:[0-9]+)?$'

                # ── Expo Go ───────────────────────────────
                - '^exp://.*$'

            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            allow_headers: ['Content-Type', 'Authorization', 'Accept']
            max_age: 3600
            allow_credentials: false