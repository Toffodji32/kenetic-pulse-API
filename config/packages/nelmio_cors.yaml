nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            - '^https?://localhost(:[0-9]+)?$'
            - '^https?://127\.0\.0\.1(:[0-9]+)?$'
            - '^https?://10\.0\.2\.2(:[0-9]+)?$'
            - '^https?://192\.168\.\d+\.\d+(:[0-9]+)?$'
            - '^https?://172\.\d+\.\d+\.\d+(:[0-9]+)?$'
            - '^https?://10\.\d+\.\d+\.\d+(:[0-9]+)?$'
            - '^exp://.*$'
            # ← AJOUTER
            - '^https://kinetic-pulse-phi\.vercel\.app$'
            - '^https://.*\.vercel\.app$'

        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept']
        expose_headers: ['Link']
        max_age: 3600
        allow_credentials: false

    paths:
        '^/api':
            origin_regex: true
            allow_origin:
                - '^https?://localhost(:[0-9]+)?$'
                - '^https?://127\.0\.0\.1(:[0-9]+)?$'
                - '^https?://10\.0\.2\.2(:[0-9]+)?$'
                - '^https?://192\.168\.\d+\.\d+(:[0-9]+)?$'
                - '^https?://172\.\d+\.\d+\.\d+(:[0-9]+)?$'
                - '^https?://10\.\d+\.\d+\.\d+(:[0-9]+)?$'
                - '^exp://.*$'
                # ← AJOUTER
                - '^https://kinetic-pulse-phi\.vercel\.app$'
                - '^https://.*\.vercel\.app$'

            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            allow_headers: ['Content-Type', 'Authorization', 'Accept']
            max_age: 3600
            allow_credentials: false