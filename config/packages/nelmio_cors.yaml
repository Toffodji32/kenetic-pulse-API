nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: 
            - 'http://localhost:5173'
            - 'http://localhost:3000'
            - 'http://127.0.0.1:5173'
            - 'http://127.0.0.1:8000'
            - 'http://127.0.0.1:3000'
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Accept']
        expose_headers: ['Link']
        max_age: 3600
        allow_credentials: true
    paths:
        '^/api':
            origin_regex: false
            allow_origin: 
                - 'http://localhost:5173'
                - 'http://localhost:3000'
                - 'http://127.0.0.1:5173'
                - 'http://127.0.0.1:8000'
                - 'http://127.0.0.1:3000'
            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            allow_headers: ['Content-Type', 'Authorization', 'Accept']
            max_age: 3600
            allow_credentials: true